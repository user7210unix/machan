<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ════════════════════════════════════
       PALETTE DEFINITIONS
    ════════════════════════════════════ */
    :root, [data-theme="ember"] {
      --bg:       #0a0908;
      --surface:  #111009;
      --raised:   #181512;
      --border:   #211e1a;
      --tx1: #ede4d6;
      --tx2: #6a6158;
      --tx3: #312d29;
      --acc:     #c45c1a;
      --acc-dim: #4a1f08;
      --acc-hi:  #e07840;
      --h0: #181512; --h1: #3d2210; --h2: #7a3610; --h3: #c45c1a;
      --gt: #5a8a4a;
      --grad: rgba(8,7,6,0.95);
    }

    [data-theme="green"] {
      --bg:       #060e0d;
      --surface:  #091413;
      --raised:   #0d1e1c;
      --border:   #132420;
      --tx1: #d4ede5;
      --tx2: #408A71;
      --tx3: #1e3a30;
      --acc:     #408A71;
      --acc-dim: #1a4035;
      --acc-hi:  #B0E4CC;
      --h0: #0d1e1c; --h1: #1a3d30; --h2: #285A48; --h3: #408A71;
      --gt: #B0E4CC;
      --grad: rgba(6,14,13,0.95);
    }

    [data-theme="navy"] {
      --bg:       #010810;
      --surface:  #010f1c;
      --raised:   #031525;
      --border:   #071e30;
      --tx1: #E2E2B6;
      --tx2: #6EACDA;
      --tx3: #1a3a55;
      --acc:     #6EACDA;
      --acc-dim: #03346E;
      --acc-hi:  #E2E2B6;
      --h0: #031525; --h1: #03346E; --h2: #1a5580; --h3: #6EACDA;
      --gt: #E2E2B6;
      --grad: rgba(1,8,16,0.95);
    }

    /* ════════════════════════════════════
       BASE
    ════════════════════════════════════ */
    html { font-size: 15px; }

    body {
      background: var(--bg);
      color: var(--tx1);
      font-family: 'Roboto', -apple-system, sans-serif;
      line-height: 1.5;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ════════════════════════════════════
       HEADER
    ════════════════════════════════════ */
    header {
      height: 54px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      flex-shrink: 0;
      z-index: 100;
    }

    .logo {
      font-weight: 900;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--tx2);
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }
    .logo em { color: var(--acc); font-style: normal; }

    .boards {
      display: flex;
      gap: 3px;
      flex: 1;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .boards::-webkit-scrollbar { display: none; }

    .b-btn {
      border: none;
      background: none;
      color: var(--tx3);
      font-family: 'Roboto', sans-serif;
      font-weight: 600;
      font-size: 0.72rem;
      padding: 7px 10px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.12s, background 0.12s;
      border-radius: 3px;
    }
    .b-btn:active { opacity: 0.5; }
    .b-btn.on { color: var(--acc-hi); background: var(--acc-dim); }

    .opt-btn {
      border: none;
      background: none;
      color: var(--tx2);
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      padding: 8px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .opt-btn:active { opacity: 0.5; }

    /* Sort strip */
    #sortbar {
      height: 42px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 6px;
      flex-shrink: 0;
    }

    .sort-label {
      font-size: 0.6rem;
      font-weight: 800;
      color: var(--tx3);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-right: 2px;
    }

    .s-btn {
      border: 1px solid transparent;
      background: none;
      color: var(--tx2);
      font-family: 'Roboto', sans-serif;
      font-weight: 500;
      font-size: 0.72rem;
      padding: 5px 12px;
      cursor: pointer;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      border-radius: 20px;
      transition: all 0.12s;
    }
    .s-btn.on {
      background: var(--acc-dim);
      color: var(--acc-hi);
      border-color: var(--acc);
    }

    /* ════════════════════════════════════
       OPTIONS DRAWER
    ════════════════════════════════════ */
    #opts-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 400;
    }
    #opts-overlay.open { display: block; }

    #opts-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: min(290px, 86vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 401;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.24s cubic-bezier(0.4,0,0.2,1);
    }
    #opts-overlay.open #opts-panel { transform: translateX(0); }

    .opts-head {
      height: 54px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }
    .opts-title {
      font-weight: 700;
      font-size: 0.92rem;
      color: var(--tx1);
      flex: 1;
    }
    .opts-close {
      background: none;
      border: none;
      color: var(--tx2);
      font-size: 1.3rem;
      line-height: 1;
      cursor: pointer;
      padding: 4px;
      -webkit-tap-highlight-color: transparent;
    }
    .opts-close:active { opacity: 0.5; }

    .opts-body {
      flex: 1;
      overflow-y: auto;
      padding: 22px 16px;
    }

    .opts-section-label {
      font-size: 0.6rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--tx3);
      margin-bottom: 14px;
    }

    .palette-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .palette-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: var(--raised);
      transition: border-color 0.15s;
    }
    .palette-row.active { border-color: var(--acc); }
    .palette-row:active { opacity: 0.65; }

    .swatch-strip { display: flex; gap: 3px; flex-shrink: 0; }
    .swatch { width: 14px; height: 32px; border-radius: 2px; }

    .palette-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--tx1);
      flex: 1;
    }
    .palette-check {
      font-size: 0.85rem;
      color: var(--acc-hi);
      opacity: 0;
    }
    .palette-row.active .palette-check { opacity: 1; }

    /* ════════════════════════════════════
       FEED
    ════════════════════════════════════ */
    #feed {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    #feed::-webkit-scrollbar       { width: 2px; }
    #feed::-webkit-scrollbar-track { background: transparent; }
    #feed::-webkit-scrollbar-thumb { background: var(--border); }

    /* ════════════════════════════════════
       CLUSTER
    ════════════════════════════════════ */
    .cluster { border-bottom: 1px solid var(--border); }

    .cl-head {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      border-bottom: 1px solid var(--border);
    }

    .cl-pip { width: 5px; height: 5px; flex-shrink: 0; border-radius: 50%; }

    .cl-name {
      font-weight: 800;
      font-size: 0.68rem;
      color: var(--tx2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex: 1;
    }

    .cl-count { font-size: 0.62rem; color: var(--tx3); font-weight: 400; }
    .cl-toggle { font-size: 0.8rem; color: var(--tx3); width: 14px; text-align: right; flex-shrink: 0; }

    .cl-body { display: block; }
    .cl-body.shut { display: none; }

    /* ════════════════════════════════════
       CARD GRID
    ════════════════════════════════════ */
    .cl-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }

    /* Heat stripe */
    .card-hero::before,
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--hs, transparent);
      z-index: 4;
    }

    /* ── HERO CARD ──
     * Full-resolution image, 16:9. Shimmer while loading,
     * fade-in when loaded. Overlay title + stats.
     */
    .card-hero {
      grid-column: 1 / -1;
      position: relative;
      background: var(--surface);
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .hero-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      background: var(--raised);
    }

    /* Shimmer animation while image loads */
    .shimmer-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        var(--raised) 0%,
        var(--border) 45%,
        var(--raised) 100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.7s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.35s ease;
      z-index: 1;
    }
    .hero-img.loaded { opacity: 1; }
    .card-hero:active .hero-img { transform: scale(1.015); transition: opacity 0.35s ease, transform 0.3s ease; }

    .hero-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 72%;
      background: linear-gradient(to bottom, transparent, var(--grad));
      pointer-events: none;
      z-index: 2;
    }

    .hero-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 18px 14px 14px;
      z-index: 3;
    }

    .hero-subject {
      font-weight: 700;
      font-style: italic;
      font-size: 1.1rem;
      color: #fff;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 7px;
    }

    /* ── GRID CARD ── */
    .card {
      position: relative;
      background: var(--surface);
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .card-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--raised);
      overflow: hidden;
      position: relative;
    }

    .card-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1;
    }
    .card-img.loaded { opacity: 1; }
    .card:active .card-img { transform: scale(1.04); transition: opacity 0.3s ease, transform 0.25s ease; }

    .card-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60%;
      background: linear-gradient(to bottom, transparent, var(--grad));
      pointer-events: none;
      z-index: 2;
    }

    .card-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 8px 9px 9px;
      z-index: 3;
    }

    .card-subject {
      font-weight: 600;
      font-style: italic;
      font-size: 0.8rem;
      color: #fff;
      line-height: 1.28;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .img-none {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--tx3);
      text-transform: uppercase;
    }

    /* Stats */
    .stats { display: flex; gap: 7px; align-items: center; }
    .st { font-size: 0.6rem; font-weight: 400; color: rgba(255,255,255,0.3); }
    .st-vel { color: var(--acc-hi); font-weight: 700; }

    /* ════════════════════════════════════
       PULL-TO-REFRESH
    ════════════════════════════════════ */
    #ptr {
      height: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--tx3);
      background: var(--bg);
      transition: height 0.2s;
    }
    #ptr.show { height: 38px; }

    /* ════════════════════════════════════
       SKELETON
    ════════════════════════════════════ */
    .skel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }
    .skel-hero {
      grid-column: 1 / -1;
      aspect-ratio: 16 / 9;
      background: var(--raised);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .skel-card {
      aspect-ratio: 1 / 1;
      background: var(--raised);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .skel-card:nth-child(even) { animation-delay: 0.25s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.85; }
    }
    .skel-head {
      height: 42px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .state-msg {
      padding: 60px 14px;
      text-align: center;
      font-size: 0.7rem;
      color: var(--tx3);
      letter-spacing: 0.06em;
    }

    /* ════════════════════════════════════
       THREAD PANEL
    ════════════════════════════════════ */
    #panel {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 200;
      flex-direction: column;
    }
    #panel.open { display: flex; }

    .p-head {
      height: 54px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      flex-shrink: 0;
    }

    .p-back {
      background: none;
      border: none;
      color: var(--acc);
      font-family: 'Roboto', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 8px 0;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .p-back:active { opacity: 0.5; }

    .p-title {
      flex: 1;
      font-weight: 700;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--tx1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .p-tag { font-size: 0.58rem; color: var(--tx3); flex-shrink: 0; }

    .p-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 14px;
      padding-bottom: 32px;
    }
    .p-scroll::-webkit-scrollbar       { width: 2px; }
    .p-scroll::-webkit-scrollbar-track { background: transparent; }
    .p-scroll::-webkit-scrollbar-thumb { background: var(--border); }

    .op-wrap { width: 100%; margin-bottom: 14px; background: var(--raised); }
    .op-img {
      width: 100%; max-height: 460px;
      object-fit: contain; display: block;
      background: var(--raised); cursor: pointer;
    }

    .post {
      background: var(--surface);
      border-left: 2px solid var(--border);
      padding: 10px 12px;
      margin-bottom: 7px;
    }
    .post.is-op { border-left-color: var(--acc-dim); }

    .post-hdr {
      display: flex; gap: 8px;
      align-items: baseline; margin-bottom: 5px;
    }
    .p-no   { font-size: 0.6rem; font-weight: 500; color: var(--tx3); }
    .p-time { font-size: 0.6rem; color: var(--tx3); }

    .post-body { font-size: 0.85rem; line-height: 1.65; color: var(--tx1); word-break: break-word; }
    .post-body .gt { color: var(--gt); }

    .post-img {
      max-width: 100%; max-height: 260px;
      object-fit: contain; display: block;
      margin-top: 9px; background: var(--raised); cursor: pointer;
    }

    /* ════════════════════════════════════
       LIGHTBOX
    ════════════════════════════════════ */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.97);
      z-index: 500;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }

    #lb-img { max-width: 100%; max-height: 90dvh; object-fit: contain; }
    #lb-hint { margin-top: 10px; font-size: 0.58rem; color: rgba(255,255,255,0.18); letter-spacing: 0.1em; text-transform: uppercase; }

    button { -webkit-tap-highlight-color: transparent; }
    img { -webkit-user-drag: none; user-select: none; }
  </style>
</head>
<body>

<div id="app">

  <header>
    <div class="logo">/<em id="logo-board">hr</em>/</div>
    <div class="boards" id="boards"></div>
    <button class="opt-btn" id="opt-btn" aria-label="Options">⚙</button>
  </header>

  <div id="sortbar">
    <span class="sort-label">sort</span>
    <button class="s-btn on" data-sort="heat">heat</button>
    <button class="s-btn"    data-sort="new">new</button>
    <button class="s-btn"    data-sort="img">images</button>
  </div>

  <div id="ptr">↓ release to refresh</div>

  <div id="feed">
    <div class="state-msg">—</div>
  </div>

</div>

<!-- Options drawer -->
<div id="opts-overlay">
  <div id="opts-panel">
    <div class="opts-head">
      <div class="opts-title">Options</div>
      <button class="opts-close" id="opts-close">✕</button>
    </div>
    <div class="opts-body">

      <div class="opts-section-label">Color Palette</div>
      <div class="palette-grid">

        <div class="palette-row" data-theme="ember">
          <div class="swatch-strip">
            <div class="swatch" style="background:#0a0908"></div>
            <div class="swatch" style="background:#3d2210"></div>
            <div class="swatch" style="background:#7a3610"></div>
            <div class="swatch" style="background:#c45c1a"></div>
          </div>
          <div class="palette-name">Dark Ember</div>
          <div class="palette-check">✓</div>
        </div>

        <div class="palette-row" data-theme="green">
          <div class="swatch-strip">
            <div class="swatch" style="background:#091413"></div>
            <div class="swatch" style="background:#285A48"></div>
            <div class="swatch" style="background:#408A71"></div>
            <div class="swatch" style="background:#B0E4CC"></div>
          </div>
          <div class="palette-name">Dark Green</div>
          <div class="palette-check">✓</div>
        </div>

        <div class="palette-row" data-theme="navy">
          <div class="swatch-strip">
            <div class="swatch" style="background:#010f1c"></div>
            <div class="swatch" style="background:#03346E"></div>
            <div class="swatch" style="background:#6EACDA"></div>
            <div class="swatch" style="background:#E2E2B6"></div>
          </div>
          <div class="palette-name">Dark Navy</div>
          <div class="palette-check">✓</div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Thread panel -->
<div id="panel">
  <div class="p-head">
    <button class="p-back" id="p-back">← Back</button>
    <div class="p-title" id="p-title">—</div>
    <div class="p-tag"   id="p-tag"></div>
  </div>
  <div class="p-scroll" id="p-scroll"></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <img id="lb-img" src="" alt="">
  <div id="lb-hint">tap to close</div>
</div>

<script>
/* ══════════════════════════════════════════════════════
 *  FULL SCRIPT - ALL IMAGES FORCED VIA PROXY
 *  No direct i.4cdn.org allowed
 ══════════════════════════════════════════════════════ */

const PROXIES = [
  'https://api.codetabs.com/v1/proxy?quest=',
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?',
];

const IMG_PROXIES = [
  'https://api.codetabs.com/v1/proxy?quest=',     // Primary
  'https://api.allorigins.win/raw?url=',          // Fallback 1
  'https://corsproxy.io/?',                       // Fallback 2
];

const API     = 'https://a.4cdn.org';
const IMG_CDN = 'https://i.4cdn.org';

const BOARDS = [
  { id: 'hr', label: '/hr/' }, { id: 'wg', label: '/wg/' },
  { id: 'w',  label: '/w/'  }, { id: 'a',  label: '/a/'  },
  { id: 'p',  label: '/p/'  }, { id: 'ck', label: '/ck/' },
  { id: 'g',  label: '/g/'  }, { id: 'mu', label: '/mu/' },
];

const SEEDS = [
  { key: 'nature',   terms: ['nature','landscape','forest','mountain','ocean','sky','sunset','beach','trees','water','lake','river','wildlife','earth','flower','field','park'] },
  { key: 'urban',    terms: ['city','urban','street','architecture','building','night','neon','tokyo','nyc','paris','london','downtown','road','bridge','metro','alley'] },
  { key: 'portrait', terms: ['portrait','face','eyes','person','girl','man','model','skin','hair','body','woman','people','crowd','self'] },
  { key: 'abstract', terms: ['abstract','texture','pattern','color','art','minimal','geometry','macro','detail','shape','form','graphic','design','visual'] },
  { key: 'space',    terms: ['space','galaxy','nebula','stars','nasa','astronomy','cosmos','planet','orbit','moon','sun','telescope','void'] },
  { key: 'anime',    terms: ['anime','manga','waifu','character','series','episode','scan','fanart','illustration','1girl','2girls','vn','visual novel','game','eroge'] },
  { key: 'film',     terms: ['film','cinema','movie','director','scene','shot','color grading','photography','35mm','analog','kodak','fuji','grain','medium format'] },
  { key: 'general',  terms: [] },
];

/* ── STATE ── */
const S = {
  board:   'wg',
  sort:    'heat',
  threads: [],
  clusters:[],
  loading: false,
  theme:   localStorage.getItem('cat-theme') || 'ember',
};

let catalogAbort = null;

/* ── FETCH HELPERS ── */
async function fetchJSON(url, signal) {
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy + encodeURIComponent(url), signal ? { signal } : {});
      if (res.ok) return await res.json();
    } catch(e) {
      if (e.name === 'AbortError') return null;
    }
  }
  return null;
}

/* ALL IMAGES FORCED THROUGH PROXY */
function makeCatalogImgUrl(board, tim, ext, width) {
  if (!tim || !ext) return null;
  const isVideo = ['.webm', '.mp4'].includes(ext.toLowerCase());
  const raw = isVideo ? `${IMG_CDN}/${board}/${tim}s.jpg` : `${IMG_CDN}/${board}/${tim}${ext}`;
  return IMG_PROXIES[0] + encodeURIComponent(raw);
}

function makeFullUrl(board, tim, ext) {
  if (!tim || !ext) return null;
  const raw = `${IMG_CDN}/${board}/${tim}${ext}`;
  return IMG_PROXIES[0] + encodeURIComponent(raw);   // Always proxy
}

/* Image loader - always uses proxy with fallback */
function loadImgWithFallback(img, makeUrlFn) {
  let idx = 0;
  const tryNext = () => {
    if (idx >= IMG_PROXIES.length) {
      img.style.display = 'none';
      return;
    }
    const src = makeUrlFn(idx++);
    if (!src) { tryNext(); return; }
    img.onerror = tryNext;
    img.src = src;
  };
  img.onload = () => img.classList.add('loaded');
  img.crossOrigin = "anonymous";
  tryNext();
}

/* ── CORE FUNCTIONS ── */
function heatScore(t) {
  const h = Math.max((Date.now()/1000 - t.time) / 3600, 0.05);
  return Math.min((t.replies||0) / h / 60, 1);
}
function heatColor(s) {
  return s < 0.15 ? 'var(--h0)' : s < 0.4 ? 'var(--h1)' : s < 0.7 ? 'var(--h2)' : 'var(--h3)';
}
function classify(t) {
  const hay = [t.sub||'', t.com||'', t.filename||''].join(' ').toLowerCase();
  let best = { key: 'general', n: 0 };
  for (const s of SEEDS) {
    if (!s.terms.length) continue;
    const n = s.terms.filter(w => hay.includes(w)).length;
    if (n > best.n) best = { key: s.key, n };
  }
  return best.key;
}
function buildClusters(threads, sort) {
  const ann = threads.map(t => ({ ...t, _heat: heatScore(t), _cl: classify(t) }));
  const cmp = { heat:(a,b)=>b._heat-a._heat, new:(a,b)=>b.time-a.time, img:(a,b)=>(b.images||0)-(a.images||0) }[sort] || ((a,b)=>b._heat-a._heat);
  ann.sort(cmp);
  const map = new Map();
  for (const t of ann) {
    if (!map.has(t._cl)) map.set(t._cl,[]);
    map.get(t._cl).push(t);
  }
  const clusters = [];
  for (const [key,ts] of map) {
    clusters.push({ key, threads:ts, avgHeat: ts.reduce((s,t)=>s+t._heat,0)/ts.length });
  }
  clusters.sort((a,b) => b.avgHeat - a.avgHeat);
  return clusters;
}

function parseComment(html) {
  if (!html) return '';
  let t = html.replace(/<br\s*\/?>/gi,'\n').replace(/<[^>]+>/g,'')
    .replace(/&gt;/g,'>').replace(/&lt;/g,'<').replace(/&amp;/g,'&')
    .replace(/&quot;/g,'"').replace(/&#039;/g,"'").trim();
  return t.split('\n').map(l => {
    const s = l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return l.startsWith('>') ? `<span class="gt">${s}</span>` : s;
  }).join('<br>');
}
function stripHtml(h) {
  if (!h) return '';
  return h.replace(/<[^>]+>/g,'').replace(/&gt;/g,'>').replace(/&lt;/g,'<')
    .replace(/&amp;/g,'&').replace(/&quot;/g,'"').replace(/&#039;/g,"'").trim();
}
function relTime(ts) {
  const d = Math.floor(Date.now()/1000) - ts;
  return d<60 ? 'now' : d<3600 ? `${Math.floor(d/60)}m` : d<86400 ? `${Math.floor(d/3600)}h` : `${Math.floor(d/86400)}d`;
}
function velLabel(t) {
  if (t._heat < 0.05) return '';
  const h = Math.max((Date.now()/1000 - t.time)/3600, 0.05);
  return `${Math.round((t.replies||0)/h)}r/h`;
}
function statsHtml(t) {
  const v = velLabel(t);
  return `<div class="stats">
    <span class="st">${t.replies||0}R</span>
    <span class="st">${t.images||0}I</span>
    <span class="st">${relTime(t.time)}</span>
    ${v?`<span class="st st-vel">${v}</span>`:''}
  </div>`;
}

function showSkeleton() {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  for (let c=0; c<3; c++) {
    const h=document.createElement('div'); h.className='skel-head'; feed.appendChild(h);
    const g=document.createElement('div'); g.className='skel-grid';
    const hero=document.createElement('div'); hero.className='skel-hero'; g.appendChild(hero);
    for (let i=0;i<4;i++){const cc=document.createElement('div');cc.className='skel-card';g.appendChild(cc);}
    feed.appendChild(g);
  }
}

/* ── RENDER CATALOG ── */
function renderFeed(clusters, board) {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  if (!clusters.length) { feed.innerHTML='<div class="state-msg">no threads found</div>'; return; }

  const io = new IntersectionObserver(entries => {
    for (const e of entries) {
      if (e.isIntersecting) {
        const img = e.target;
        if (img._pendingLoad) { img._pendingLoad(); delete img._pendingLoad; }
        io.unobserve(img);
      }
    }
  }, { rootMargin: '700px 0px' });

  for (const cl of clusters) feed.appendChild(renderCluster(cl, board, io));
}

function renderCluster(cl, board, io) {
  const el = document.createElement('div');
  el.className = 'cluster'; el.dataset.key = cl.key;

  const head = document.createElement('div'); head.className = 'cl-head';
  const pip  = document.createElement('div'); pip.className='cl-pip'; pip.style.background=heatColor(cl.avgHeat);
  const name = document.createElement('div'); name.className='cl-name'; name.textContent=cl.key;
  const cnt  = document.createElement('div'); cnt.className='cl-count'; cnt.textContent=cl.threads.length;
  const tog  = document.createElement('div'); tog.className='cl-toggle'; tog.textContent='−';
  head.append(pip, name, cnt, tog);

  const body = document.createElement('div'); body.className = 'cl-body';
  const grid = document.createElement('div'); grid.className = 'cl-grid';

  cl.threads.forEach((t,i) =>
    grid.appendChild(i===0 ? renderHeroCard(t,board,io) : renderGridCard(t,board,io)));

  body.appendChild(grid);
  el.append(head, body);
  head.addEventListener('click', () => { const s=body.classList.toggle('shut'); tog.textContent=s?'+':'−'; });
  return el;
}

function renderHeroCard(t, board, io) {
  const card = document.createElement('div');
  card.className='card-hero'; card.dataset.no=t.no;
  card.style.setProperty('--hs', heatColor(t._heat));

  const subject = t.sub ? stripHtml(t.sub) : stripHtml(t.com).slice(0,100);
  const wrap = document.createElement('div'); wrap.className='hero-wrap';

  if (t.tim && t.ext) {
    const shimmer = document.createElement('div'); shimmer.className='shimmer-bg';
    wrap.appendChild(shimmer);

    const img = document.createElement('img'); img.className='hero-img'; img.alt='';
    const makeUrl = () => makeCatalogImgUrl(board, t.tim, t.ext, 800);

    img._pendingLoad = () => loadImgWithFallback(img, makeUrl);
    img.addEventListener('load', () => { shimmer.style.display='none'; });

    io.observe(img);
    wrap.appendChild(img);
  } else {
    wrap.innerHTML = '<div class="img-none">no image</div>';
  }

  const overlay = document.createElement('div'); overlay.className='hero-overlay';
  overlay.innerHTML = `<div class="hero-subject">${subject||''}</div>${statsHtml(t)}`;
  wrap.appendChild(overlay);

  card.appendChild(wrap);
  card.addEventListener('click', () => openThread(t, board));
  return card;
}

function renderGridCard(t, board, io) {
  const card = document.createElement('div');
  card.className='card'; card.dataset.no=t.no;
  card.style.setProperty('--hs', heatColor(t._heat));

  const subject = t.sub ? stripHtml(t.sub) : stripHtml(t.com).slice(0,60);
  const wrap = document.createElement('div'); wrap.className='card-wrap';

  if (t.tim && t.ext) {
    const shimmer = document.createElement('div'); shimmer.className='shimmer-bg';
    wrap.appendChild(shimmer);

    const img = document.createElement('img'); img.className='card-img'; img.alt='';
    const makeUrl = () => makeCatalogImgUrl(board, t.tim, t.ext, 500);

    img._pendingLoad = () => loadImgWithFallback(img, makeUrl);
    img.addEventListener('load', () => { shimmer.style.display='none'; });

    io.observe(img);
    wrap.appendChild(img);
  } else {
    wrap.innerHTML = '<div class="img-none">no image</div>';
  }

  const overlay = document.createElement('div'); overlay.className='card-overlay';
  overlay.innerHTML = `<div class="card-subject">${subject||''}</div>${statsHtml(t)}`;
  wrap.appendChild(overlay);

  card.appendChild(wrap);
  card.addEventListener('click', () => openThread(t, board));
  return card;
}

/* ── THREAD PANEL ── */
async function openThread(t, board) {
  const panel  = document.getElementById('panel');
  const scroll = document.getElementById('p-scroll');
  document.getElementById('p-title').textContent = t.sub ? stripHtml(t.sub) : stripHtml(t.com).slice(0,80);
  document.getElementById('p-tag').textContent   = `/${board}/ #${t.no}`;

  scroll.innerHTML = '<div class="state-msg">loading…</div>';
  panel.classList.add('open');

  const posts = await loadThread(board, t.no);
  scroll.innerHTML = '';

  if (!posts.length) {
    scroll.innerHTML='<div class="state-msg">thread unavailable or expired</div>';
    return;
  }

  const op = posts[0];
  if (op.tim && op.ext) {
    const wrap = document.createElement('div'); wrap.className='op-wrap';
    const img  = document.createElement('img');
    img.className='op-img';
    img.alt='';
    img.crossOrigin = "anonymous";
    img.src = makeFullUrl(board, op.tim, op.ext);
    img.onerror = () => { img.style.display='none'; };
    img.addEventListener('click', () => openLightbox(img.src));
    wrap.appendChild(img);
    scroll.appendChild(wrap);
  }

  posts.forEach((p,i) => scroll.appendChild(renderPost(p, board, i===0)));
}

function renderPost(p, board, skipImg=false) {
  const el = document.createElement('div');
  el.className = 'post' + (p.resto===0 ? ' is-op' : '');
  el.innerHTML = `<div class="post-hdr">
    <span class="p-no">#${p.no}</span>
    <span class="p-time">${relTime(p.time)}</span>
  </div>${p.com ? `<div class="post-body">${parseComment(p.com)}</div>` : ''}`;

  if (!skipImg && p.tim && p.ext) {
    const img = document.createElement('img');
    img.className='post-img';
    img.alt='';
    img.crossOrigin = "anonymous";
    img.src = makeFullUrl(board, p.tim, p.ext);
    img.loading = 'lazy';
    img.onerror = () => { img.style.display='none'; };
    img.addEventListener('click', () => openLightbox(img.src));
    el.appendChild(img);
  }
  return el;
}

function loadThread(board, no) {
  return fetchJSON(`${API}/${board}/thread/${no}.json`).then(data => data ? (data.posts || []) : []);
}

/* ── LIGHTBOX ── */
function openLightbox(src) {
  document.getElementById('lb-img').src=src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-img').src='';
}
document.getElementById('lightbox').addEventListener('click', closeLightbox);

/* ── PALETTE / OPTIONS ── */
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  S.theme = theme;
  localStorage.setItem('cat-theme', theme);
  document.querySelectorAll('.palette-row').forEach(r => r.classList.toggle('active', r.dataset.theme===theme));
}

function initOptions() {
  const btn     = document.getElementById('opt-btn');
  const overlay = document.getElementById('opts-overlay');
  const closeBtn= document.getElementById('opts-close');
  btn.addEventListener('click', () => overlay.classList.add('open'));
  closeBtn.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if(e.target===overlay) overlay.classList.remove('open'); });
  document.querySelectorAll('.palette-row').forEach(row =>
    row.addEventListener('click', () => applyTheme(row.dataset.theme)));
}

/* ── LOAD FLOW ── */
async function loadBoard(board, sort) {
  if (S.loading) return;
  S.loading=true; S.board=board; S.sort=sort;
  if (catalogAbort) catalogAbort.abort();
  catalogAbort = new AbortController();

  document.querySelectorAll('.b-btn').forEach(b => b.classList.toggle('on', b.dataset.id===board));
  document.getElementById('logo-board').textContent = board;
  showSkeleton();

  const threads = await loadCatalog(board, catalogAbort.signal);
  if (!threads||!threads.length) {
    document.getElementById('feed').innerHTML='<div class="state-msg">failed to load — check connection</div>';
    S.loading=false; return;
  }
  S.threads=threads; S.clusters=buildClusters(threads,sort);
  renderFeed(S.clusters, board);
  S.loading=false;
}

async function loadCatalog(board, signal) {
  const data = await fetchJSON(`${API}/${board}/catalog.json`, signal);
  return data ? data.flatMap(p => p.threads || []) : [];
}

/* ── EVENTS ── */
function initBoards() {
  const strip = document.getElementById('boards');
  BOARDS.forEach(b => {
    const btn=document.createElement('button');
    btn.className='b-btn'+(b.id===S.board?' on':'');
    btn.textContent=b.label;
    btn.dataset.id=b.id;
    btn.addEventListener('click', () => loadBoard(b.id, S.sort));
    strip.appendChild(btn);
  });
}

function initSort() {
  document.querySelectorAll('.s-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const sort=btn.dataset.sort; S.sort=sort;
      document.querySelectorAll('.s-btn').forEach(b=>b.classList.toggle('on',b===btn));
      if (!S.threads.length) return;
      S.clusters=buildClusters(S.threads,sort);
      renderFeed(S.clusters,S.board);
    });
  });
}

/* Pull-to-refresh */
(function() {
  const feed=document.getElementById('feed'), ptr=document.getElementById('ptr');
  let sy=0, pulling=false;
  feed.addEventListener('touchstart', e=>{if(feed.scrollTop===0){sy=e.touches[0].clientY;pulling=true;}},{passive:true});
  feed.addEventListener('touchmove',  e=>{if(pulling&&e.touches[0].clientY-sy>10)ptr.classList.add('show');},{passive:true});
  feed.addEventListener('touchend',   e=>{if(!pulling)return;pulling=false;ptr.classList.remove('show');if(e.changedTouches[0].clientY-sy>60)loadBoard(S.board,S.sort);},{passive:true});
})();

/* Swipe right to close panel */
(function() {
  const panel=document.getElementById('panel'); let sx=0;
  panel.addEventListener('touchstart', e=>{sx=e.touches[0].clientX;},{passive:true});
  panel.addEventListener('touchend',   e=>{if(e.changedTouches[0].clientX-sx>80) panel.classList.remove('open');},{passive:true});
})();

/* Keyboard shortcuts */
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(document.getElementById('lightbox').classList.contains('open')){closeLightbox();return;}
    if(document.getElementById('panel').classList.contains('open')){document.getElementById('panel').classList.remove('open');return;}
    document.getElementById('opts-overlay').classList.remove('open');
  }
  if(e.key>='1'&&e.key<='8'){
    const b=BOARDS[parseInt(e.key,10)-1];
    if(b) loadBoard(b.id,S.sort);
  }
});

/* ── BOOT ── */
applyTheme(S.theme);
initBoards();
initSort();
initOptions();
loadBoard('hr', 'heat');
</script>
